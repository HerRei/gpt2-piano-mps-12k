name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'

  smoke:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-smoke.txt

      - name: Install smoke-test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-smoke.txt

      - name: Run dependency smoke test
        run: python -m unittest tests.test_dependency_smoke
